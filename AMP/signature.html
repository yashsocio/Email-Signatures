<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMP HCC – Email Signature</title>
</head>
<body style="margin:0;padding:60px 20px;background:#F2F2F0;font-family:Arial,sans-serif;">

  <!-- ════════════════════════════════════════════════════
       HOW TO USE
       1. Open this file in a browser to preview.
       2. Select everything between SIG START and SIG END.
       3. Paste into your email client signature editor
          (must be in rich-text / HTML mode).
       4. Replace placeholder name, title, phone, email,
          address, and social URLs with real details.
       NOTE: For live email use, host "Final Logo.gif" on
       a web server and update the img src to its full URL.
       ════════════════════════════════════════════════════ -->

  <!-- SIG START -->
  <table
    width="480"
    cellpadding="0"
    cellspacing="0"
    border="0"
    style="
      max-width:480px;
      font-family:Arial,Helvetica,sans-serif;
      background:#ffffff;
      border-collapse:collapse;
    "
  >

    <!-- Top gold rule -->
    <tr>
      <td height="3" style="background:#C9993A;font-size:0;line-height:0;">&nbsp;</td>
    </tr>

    <!-- Main content -->
    <tr>
      <td style="padding:28px 32px 24px 32px;">

        <!-- NAME -->
        <p style="
          margin:0 0 4px 0;
          font-family:Georgia,'Times New Roman',serif;
          font-size:17px;
          font-weight:700;
          color:#0D1B2A;
          letter-spacing:0.02em;
          line-height:1.2;
        ">Jonathan A. Mercer</p>

        <!-- DESIGNATION -->
        <p style="
          margin:0 0 20px 0;
          font-family:Arial,Helvetica,sans-serif;
          font-size:10px;
          font-weight:400;
          color:#C9993A;
          letter-spacing:0.16em;
          text-transform:uppercase;
          line-height:1;
        ">Senior Director &nbsp;&middot;&nbsp; Healthcare Consulting</p>

        <!-- CONTACT -->
        <p style="
          margin:0 0 6px 0;
          font-family:Arial,Helvetica,sans-serif;
          font-size:11.5px;
          color:#4A5568;
          line-height:1.9;
        ">
          <a href="tel:+12125550199" style="color:#4A5568;text-decoration:none;">+1 (212) 555-0199</a>
          &nbsp;<span style="color:#D4B896;">&middot;</span>&nbsp;
          <a href="tel:+19175550134" style="color:#4A5568;text-decoration:none;">+1 (917) 555-0134</a><br />
          <a href="mailto:j.mercer@amphcc.com" style="color:#0D1B2A;text-decoration:none;border-bottom:1px solid #D4B896;">j.mercer@amphcc.com</a><br />
          350 Fifth Avenue, Suite 4800, New York, NY 10118
        </p>

        <!-- Divider -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:16px 0;">
          <tr>
            <td height="1" style="background:#EEEEEE;font-size:0;line-height:0;">&nbsp;</td>
          </tr>
        </table>

        <!-- WEBSITE & SOCIAL LINKS -->
        <table cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td style="padding-right:20px;">
              <a href="https://www.amphcc.com" style="
                font-family:Arial,Helvetica,sans-serif;
                font-size:10px;
                letter-spacing:0.1em;
                text-transform:uppercase;
                color:#0D1B2A;
                text-decoration:none;
                border-bottom:1px solid #C9993A;
                padding-bottom:1px;
              ">Website</a>
            </td>
            <td style="padding-right:20px;">
              <a href="https://linkedin.com/company/amphcc" style="
                font-family:Arial,Helvetica,sans-serif;
                font-size:10px;
                letter-spacing:0.1em;
                text-transform:uppercase;
                color:#0D1B2A;
                text-decoration:none;
                border-bottom:1px solid #C9993A;
                padding-bottom:1px;
              ">LinkedIn</a>
            </td>
            <td style="padding-right:20px;">
              <a href="https://facebook.com/amphcc" style="
                font-family:Arial,Helvetica,sans-serif;
                font-size:10px;
                letter-spacing:0.1em;
                text-transform:uppercase;
                color:#0D1B2A;
                text-decoration:none;
                border-bottom:1px solid #C9993A;
                padding-bottom:1px;
              ">Facebook</a>
            </td>
            <td>
              <a href="https://twitter.com/amphcc" style="
                font-family:Arial,Helvetica,sans-serif;
                font-size:10px;
                letter-spacing:0.1em;
                text-transform:uppercase;
                color:#0D1B2A;
                text-decoration:none;
                border-bottom:1px solid #C9993A;
                padding-bottom:1px;
              ">X / Twitter</a>
            </td>
          </tr>
        </table>

      </td>
    </tr>

    <!-- LOGO FOOTER -->
    <tr>
      <td style="background:#0D1B2A;padding:20px 32px;text-align:center;">
        <img
          src="Final Logo.gif"
          alt="AMP HCC"
          width="220"
          style="display:block;margin:0 auto;max-width:220px;height:auto;border:0;"
        />
      </td>
    </tr>

    <!-- Bottom gold rule -->
    <tr>
      <td height="3" style="background:#C9993A;font-size:0;line-height:0;">&nbsp;</td>
    </tr>

  </table>
  <!-- SIG END -->

</body>
</html>
